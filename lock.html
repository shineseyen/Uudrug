<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нэвтрэх</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: url('https://plus.unsplash.com/premium_photo-1676968002767-1f6a09891350?q=80&w=1200') no-repeat center center;
    background-size: cover;
    color:white;
    font-family: Arial;
}

.box{
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    padding:15px 20px;
    border-radius:30px;
    display:flex;
    align-items:center;
    position:relative;
}

input{
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:16px;
    padding-right:30px;
}

button{
    position:absolute;
    right:5px;
    border:none;
    background:none;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#error{
    margin-top:10px;
    color:lightgray;
}
</style>
</head>
<body>

<h2>Нууц код оруулна уу</h2>

<div class="box">
    <input type="password" id="code" placeholder="Код" onkeypress="if(event.key==='Enter') checkCode()">
    <button onclick="checkCode()">➜</button>
</div>

<p id="error"></p>

<script>
function checkCode(){
    const code = document.getElementById("code").value;

    if(code === "2662"){
        // 👉 зөв бол үндсэн page рүү шилжинэ
        window.location.href = "main.html";
    } else {
        document.getElementById("error").textContent = "Код буруу байна!";
    }
}
</script>

</body>
</html>
